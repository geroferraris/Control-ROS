<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Andino Teleop</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
    padding:10px;
    user-select:none;
    -webkit-user-select:none;
}

#compass{
    position:relative;
    width:280px;
    height:280px;
    margin:auto;
    border:4px solid black;
    border-radius:50%;
}

.arrow{
    position:absolute;
    left:50%;
    bottom:50%;
    width:6px;
    height:110px;
    transform-origin:bottom center;
    margin-left:-3px;
}

#robot{
    background:red;
}

#phone{
    background:blue;
}

.cardinal{
    position:absolute;
    font-size:20px;
    font-weight:bold;
}

#north{top:5px;left:50%;transform:translateX(-50%);}
#south{bottom:5px;left:50%;transform:translateX(-50%);}
#east{right:5px;top:50%;transform:translateY(-50%);}
#west{left:5px;top:50%;transform:translateY(-50%);}

.info{
    margin-top:8px;
    font-size:18px;
}

.slider-container{
    margin:15px;
}

input[type="range"]{
    width:250px;
}

#controls{
    width:320px;
    margin:auto;
    margin-top:20px;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

.ctrl{
    height:80px;
    font-size:32px;
    touch-action:none;
}

#cmd{
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
}

button{
    margin:5px;
    padding:10px;
}

</style>
</head>
<body>

<h2>Andino Teleop</h2>

<div id="compass">

    <div id="north" class="cardinal">N</div>
    <div id="south" class="cardinal">S</div>
    <div id="east" class="cardinal">E</div>
    <div id="west" class="cardinal">O</div>

    <div id="robot" class="arrow"></div>
    <div id="phone" class="arrow"></div>

</div>

<div class="info">
Robot:
<span id="robotDeg">0</span>°
</div>

<div class="info">
Teléfono:
<span id="phoneDeg">0</span>°
</div>

<div class="info">
Δ:
<span id="deltaDeg">0</span>°
</div>

<br>

<button onclick="enableSensors()">
Activar sensores
</button>

<button onclick="disableSensors()">
Desactivar sensores
</button>

<button onclick="syncOrientation()">
Sincronizar
</button>

<div class="slider-container">

Velocidad lineal

<br>

<input
    type="range"
    id="linear"
    min="0"
    max="1"
    step="0.01"
    value="0.20">

<br>

<span id="linearValue">0.20</span>

</div>

<div class="slider-container">

Velocidad angular

<br>

<input
    type="range"
    id="angular"
    min="0"
    max="2"
    step="0.01"
    value="0.80">

<br>

<span id="angularValue">0.80</span>

</div>

<div id="controls">

<button class="ctrl" data-cmd="↖">↖</button>
<button class="ctrl" data-cmd="↑">↑</button>
<button class="ctrl" data-cmd="↗">↗</button>

<button class="ctrl" data-cmd="←">←</button>
<button class="ctrl" data-cmd="■">■</button>
<button class="ctrl" data-cmd="→">→</button>

<button class="ctrl" data-cmd="↙">↙</button>
<button class="ctrl" data-cmd="↓">↓</button>
<button class="ctrl" data-cmd="↘">↘</button>

</div>

<div id="cmd">
Comando: ■
</div>

<script>

let robotYaw = 0;
let phoneYaw = 0;
let offset = 0;

let sensorEnabled = false;

let currentCommand = "■";

function updateCompass()
{
    document.getElementById("robot").style.transform =
        `rotate(${robotYaw}deg)`;

    document.getElementById("phone").style.transform =
        `rotate(${phoneYaw}deg)`;

    document.getElementById("robotDeg").innerText =
        Math.round(robotYaw);

    document.getElementById("phoneDeg").innerText =
        Math.round(phoneYaw);

    let delta = robotYaw - phoneYaw;

    while(delta > 180) delta -= 360;
    while(delta < -180) delta += 360;

    document.getElementById("deltaDeg").innerText =
        Math.round(delta);

    document.getElementById("cmd").innerText =
        "Comando: " + currentCommand;
}

function syncOrientation()
{
    offset = robotYaw - phoneYaw;
}

function handleOrientation(event)
{
    if(!sensorEnabled) return;

    if(event.alpha !== null)
    {
        phoneYaw = event.alpha + offset;
    }
}

async function enableSensors()
{
    try
    {
        if(
            typeof DeviceOrientationEvent !== "undefined"
            &&
            typeof DeviceOrientationEvent.requestPermission === "function"
        )
        {
            const permission =
                await DeviceOrientationEvent.requestPermission();

            if(permission !== "granted")
                return;
        }

        sensorEnabled = true;

        window.addEventListener(
            "deviceorientation",
            handleOrientation
        );

        alert("Sensores activados");
    }
    catch(err)
    {
        alert(err);
    }
}

function disableSensors()
{
    sensorEnabled = false;
}

document
.getElementById("linear")
.oninput = function()
{
    document.getElementById("linearValue")
    .innerText = this.value;
};

document
.getElementById("angular")
.oninput = function()
{
    document.getElementById("angularValue")
    .innerText = this.value;
};

document
.querySelectorAll(".ctrl")
.forEach(btn =>
{
    const start = () =>
    {
        currentCommand =
            btn.dataset.cmd;

        switch(currentCommand)
        {
            case "←":
                robotYaw -= 5;
                break;

            case "→":
                robotYaw += 5;
                break;

            case "↖":
                robotYaw -= 5;
                break;

            case "↗":
                robotYaw += 5;
                break;

            case "↙":
                robotYaw -= 5;
                break;

            case "↘":
                robotYaw += 5;
                break;
        }
    };

    const stop = () =>
    {
        currentCommand = "■";
    };

    btn.addEventListener("touchstart", start);
    btn.addEventListener("touchend", stop);

    btn.addEventListener("mousedown", start);
    btn.addEventListener("mouseup", stop);
});

setInterval(updateCompass,50);

/* #########################################################
   #########################################################
   #########################################################

   FUTURO ROS 2

   CAMBIAR AQUÍ EL TOPIC DEL ROBOT

   const CMD_VEL_TOPIC = "/cmd_vel";

   CAMBIAR AQUÍ EL TOPIC DE ODOMETRÍA

   const ODOM_TOPIC = "/odom";

   #########################################################
   #########################################################
   ######################################################### */

</script>

</body>
</html>
